<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!--
    Bone-carved d6 badge used on the "Randomize" footer action button.
  -->
  <defs>
    <linearGradient id="diceFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5ecd2" />
      <stop offset="55%" stop-color="#e0c07a" />
      <stop offset="100%" stop-color="#b99a63" />
    </linearGradient>
  </defs>
  <rect
    x="2.5"
    y="2.5"
    width="27"
    height="27"
    rx="6"
    fill="url(#diceFace)"
    stroke="#5c3a24"
    stroke-width="1.6"
  />
  <rect
    x="2.5"
    y="2.5"
    width="27"
    height="27"
    rx="6"
    fill="none"
    stroke="#f2e6c4"
    stroke-width="0.8"
    opacity="0.6"
  />
  <g fill="#3c2712">
    <circle cx="9" cy="9" r="2.4" />
    <circle cx="23" cy="9" r="2.4" />
    <circle cx="16" cy="16" r="2.4" />
    <circle cx="9" cy="23" r="2.4" />
    <circle cx="23" cy="23" r="2.4" />
  </g>
</svg>
